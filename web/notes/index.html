<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xavier2 Notes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16162a;
      --bg-tertiary: #1e1e3a;
      --bg-hover: #252545;
      --border: #2a2a4a;
      --text-primary: #e0e0f0;
      --text-secondary: #9090b0;
      --text-muted: #606080;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --tag-bg: #3730a3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { height: 48px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; }
    .header-logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; }
    .header-logo .icon { width: 24px; height: 24px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .header-search { flex: 1; max-width: 400px; }
    .header-search input { width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text-primary); font-size: 13px; outline: none; }
    .header-search input:focus { border-color: var(--accent); }
    .header-search input::placeholder { color: var(--text-muted); }
    .header-actions { display: flex; gap: 8px; }
    .header-btn { background: transparent; border: none; color: var(--text-secondary); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* Main layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all 0.15s; }
    .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar-item.active { background: var(--accent); color: white; }
    .sidebar-item .icon { font-size: 14px; }
    .sidebar-item .count { margin-left: auto; font-size: 11px; color: var(--text-muted); }

    /* Tags */
    .tags-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { background: var(--tag-bg); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .tag:hover { opacity: 0.8; }

    /* Note list */
    .note-list { flex: 1; overflow-y: auto; padding: 8px; }
    .note-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: all 0.15s; }
    .note-item:hover { background: var(--bg-hover); }
    .note-item.active { background: var(--bg-tertiary); border: 1px solid var(--border); }
    .note-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .note-preview { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .note-meta { display: flex; gap: 8px; margin-top: 6px; font-size: 11px; color: var(--text-muted); }

    /* Editor area */
    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .editor-header { padding: 16px 24px; border-bottom: 1px solid var(--border); }
    .editor-title { font-size: 24px; font-weight: 600; background: transparent; border: none; color: var(--text-primary); width: 100%; outline: none; }
    .editor-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--text-muted); }
    .editor-content { flex: 1; overflow-y: auto; padding: 24px; }
    .editor-textarea { width: 100%; min-height: 400px; background: transparent; border: none; color: var(--text-primary); font-size: 14px; line-height: 1.7; resize: none; outline: none; font-family: inherit; }
    .editor-textarea::placeholder { color: var(--text-muted); }

    /* Markdown preview */
    .markdown-preview { font-size: 14px; line-height: 1.7; }
    .markdown-preview h1 { font-size: 24px; margin: 24px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .markdown-preview h2 { font-size: 20px; margin: 20px 0 12px; }
    .markdown-preview h3 { font-size: 16px; margin: 16px 0 8px; }
    .markdown-preview p { margin: 12px 0; }
    .markdown-preview ul, .markdown-preview ol { margin: 12px 0; padding-left: 24px; }
    .markdown-preview li { margin: 4px 0; }
    .markdown-preview code { background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .markdown-preview pre { background: var(--bg-tertiary); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; }
    .markdown-preview pre code { background: none; padding: 0; }
    .markdown-preview blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--text-secondary); margin: 16px 0; }
    .markdown-preview a { color: var(--accent); }
    .markdown-preview hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .markdown-preview .wikilink { color: var(--accent); cursor: pointer; }
    .markdown-preview .wikilink:hover { text-decoration: underline; }

    /* Backlinks panel */
    .backlinks-panel { width: 280px; background: var(--bg-secondary); border-left: 1px solid var(--border); padding: 16px; overflow-y: auto; }
    .backlink-item { padding: 10px 12px; background: var(--bg-tertiary); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
    .backlink-item:hover { background: var(--bg-hover); }
    .backlink-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .backlink-preview { font-size: 12px; color: var(--text-muted); }

    /* Graph view */
    .graph-view { flex: 1; background: var(--bg-tertiary); position: relative; overflow: hidden; }
    .graph-canvas { width: 100%; height: 100%; }
    .graph-node { position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; transition: all 0.2s; }
    .graph-node:hover { transform: scale(1.5); background: var(--accent-hover); }
    .graph-node.selected { background: var(--green); }
    .graph-edge { position: absolute; height: 1px; background: var(--border); transform-origin: left center; }

    /* View tabs */
    .view-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); padding: 0 24px; background: var(--bg-secondary); }
    .view-tab { padding: 10px 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .view-tab:hover { color: var(--text-primary); }
    .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Empty state */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; padding: 40px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-secondary); }
    .empty-state p { font-size: 14px; max-width: 300px; }

    /* Quick launcher */
    .quick-launcher { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 1000; display: none; }
    .quick-launcher.active { display: block; }
    .quick-launcher input { width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text-primary); font-size: 15px; outline: none; }
    .quick-launcher input:focus { border-color: var(--accent); }
    .quick-results { margin-top: 12px; max-height: 300px; overflow-y: auto; }
    .quick-result { padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .quick-result:hover { background: var(--bg-hover); }
    .quick-result-title { font-size: 14px; font-weight: 500; }
    .quick-result-preview { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Status bar */
    .status-bar { height: 24px; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; font-size: 11px; color: var(--text-muted); gap: 16px; }
    .status-item { display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ============================================
    // XAVIER2 API CLIENT
    // ============================================
    const XAVIER2_URL = 'http://localhost:8003';
    const XAVIER2_TOKEN = 'dev-token';

    const xavier2Api = {
      async searchNotes(query) {
        const res = await fetch(`${XAVIER2_URL}/memory/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Xavier2-Token': XAVIER2_TOKEN },
          body: JSON.stringify({ query, limit: 10 })
        });
        const data = await res.json();
        return data.results || [];
      },
      async getStats() {
        const res = await fetch(`${XAVIER2_URL}/memory/stats`, {
          headers: { 'X-Xavier2-Token': XAVIER2_TOKEN }
        });
        return res.json();
      },
      async addNote(content, metadata = {}) {
        const res = await fetch(`${XAVIER2_URL}/memory/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Xavier2-Token': XAVIER2_TOKEN },
          body: JSON.stringify({ content, metadata })
        });
        return res.json();
      }
    };

    // ============================================
    // MARKDOWN PARSER
    // ============================================
    function parseMarkdown(text) {
      // Simple markdown to HTML parser
      let html = text
        // Headers
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
        // Bold/Italic
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        // Code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        // Wikilinks
        .replace(/\[\[([^\]]+)\]\]/g, '<span class="wikilink" onclick="navigateToNote(\'$1\')">$1</span>')
        // Blockquotes
        .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
        // Lists
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        // Horizontal rule
        .replace(/^---$/gm, '<hr>')
        // Paragraphs
        .replace(/\n\n/g, '</p><p>')
        // Line breaks
        .replace(/\n/g, '<br>');

      return `<p>${html}</p>`;
    }

    // ============================================
    // COMPONENTS
    // ============================================

    // Header
    function Header({ onSearch, onCommand }) {
      const [searchQuery, setSearchQuery] = useState('');

      const handleSearch = (e) => {
        if (e.key === 'Enter' && searchQuery.trim()) {
          onSearch(searchQuery);
        }
      };

      return (
        <div className="header">
          <div className="header-logo">
            <div className="icon">🧠</div>
            <span>Xavier2 Notes</span>
          </div>
          <div className="header-search">
            <input
              type="text"
              placeholder="Search notes... (Ctrl+K)"
              value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              onKeyDown={handleSearch}
            />
          </div>
          <div className="header-actions">
            <button className="header-btn" onClick={onCommand} title="Command Palette">⌘</button>
            <button className="header-btn">🔔</button>
            <button className="header-btn">⚙️</button>
          </div>
        </div>
      );
    }

    // Sidebar
    function Sidebar({ notes, activeNote, onSelectNote, tags }) {
      return (
        <div className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-title">Quick Access</div>
            <div className="sidebar-item active">
              <span className="icon">📁</span>
              <span>All Notes</span>
              <span className="count">{notes.length}</span>
            </div>
            <div className="sidebar-item">
              <span className="icon">📅</span>
              <span>Daily Notes</span>
            </div>
            <div className="sidebar-item">
              <span className="icon">⭐</span>
              <span>Starred</span>
            </div>
          </div>

          <div className="sidebar-section">
            <div className="sidebar-title">Tags</div>
            <div className="tags-list">
              {tags.map(tag => (
                <span key={tag} className="tag">{tag}</span>
              ))}
            </div>
          </div>

          <div className="sidebar-section" style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            <div className="sidebar-title">Notes</div>
            <div className="note-list">
              {notes.map(note => (
                <div
                  key={note.id}
                  className={`note-item ${activeNote?.id === note.id ? 'active' : ''}`}
                  onClick={() => onSelectNote(note)}
                >
                  <div className="note-title">{note.title || 'Untitled'}</div>
                  <div className="note-preview">{note.content?.substring(0, 60)}...</div>
                  <div className="note-meta">
                    <span>📅 {new Date(note.created_at || Date.now()).toLocaleDateString()}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // Editor
    function Editor({ note, onUpdate, onSave }) {
      const [title, setTitle] = useState(note?.title || '');
      const [content, setContent] = useState(note?.content || '');
      const [view, setView] = useState('edit'); // edit, preview, graph
      const saveTimeout = useRef(null);

      useEffect(() => {
        setTitle(note?.title || '');
        setContent(note?.content || '');
      }, [note?.id]);

      const handleContentChange = (e) => {
        setContent(e.target.value);

        // Auto-save after 1 second of inactivity
        if (saveTimeout.current) clearTimeout(saveTimeout.current);
        saveTimeout.current = setTimeout(() => {
          onSave({ ...note, title, content: e.target.value });
        }, 1000);
      };

      if (!note) {
        return (
          <div className="empty-state">
            <div className="icon">📝</div>
            <h3>No note selected</h3>
            <p>Select a note from the sidebar or create a new one to get started.</p>
          </div>
        );
      }

      return (
        <div className="editor-area">
          <div className="view-tabs">
            <div className={`view-tab ${view === 'edit' ? 'active' : ''}`} onClick={() => setView('edit')}>Edit</div>
            <div className={`view-tab ${view === 'preview' ? 'active' : ''}`} onClick={() => setView('preview')}>Preview</div>
            <div className={`view-tab ${view === 'graph' ? 'active' : ''}`} onClick={() => setView('graph')}>Graph</div>
          </div>

          <div className="editor-header">
            <input
              type="text"
              className="editor-title"
              placeholder="Untitled"
              value={title}
              onChange={e => setTitle(e.target.value)}
            />
            <div className="editor-meta">
              <span>📅 Created: {new Date(note.created_at || Date.now()).toLocaleDateString()}</span>
              <span>📝 {content.length} characters</span>
            </div>
          </div>

          <div className="editor-content">
            {view === 'edit' && (
              <textarea
                className="editor-textarea"
                placeholder="Start writing... (Markdown supported)"
                value={content}
                onChange={handleContentChange}
              />
            )}
            {view === 'preview' && (
              <div
                className="markdown-preview"
                dangerouslySetInnerHTML={{ __html: parseMarkdown(content) }}
              />
            )}
            {view === 'graph' && (
              <GraphView notes={[]} currentNote={note} />
            )}
          </div>
        </div>
      );
    }

    // Graph View (Simple)
    function GraphView({ notes, currentNote }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        const width = canvas.width = canvas.offsetWidth;
        const height = canvas.height = canvas.offsetHeight;

        // Clear
        ctx.fillStyle = '#1e1e3a';
        ctx.fillRect(0, 0, width, height);

        // Draw center node (current note)
        const centerX = width / 2;
        const centerY = height / 2;

        // Center node
        ctx.beginPath();
        ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
        ctx.fillStyle = '#6366f1';
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(currentNote?.title?.substring(0, 10) || 'Note', centerX, centerY + 4);

        // Surrounding nodes (simulated)
        const nodeCount = 12;
        for (let i = 0; i < nodeCount; i++) {
          const angle = (i / nodeCount) * Math.PI * 2;
          const radius = 120 + Math.random() * 80;
          const x = centerX + Math.cos(angle) * radius;
          const y = centerY + Math.sin(angle) * radius;

          // Line to center
          ctx.beginPath();
          ctx.moveTo(centerX, centerY);
          ctx.lineTo(x, y);
          ctx.strokeStyle = '#2a2a4a';
          ctx.stroke();

          // Node
          ctx.beginPath();
          ctx.arc(x, y, 8, 0, Math.PI * 2);
          ctx.fillStyle = Math.random() > 0.5 ? '#6366f1' : '#22c55e';
          ctx.fill();
        }

      }, [currentNote]);

      return (
        <div className="graph-view">
          <canvas ref={canvasRef} className="graph-canvas" />
        </div>
      );
    }

    // Backlinks Panel
    function BacklinksPanel({ note }) {
      const [backlinks, setBacklinks] = useState([]);

      useEffect(() => {
        if (note?.content) {
          // Find wikilinks in content
          const wikilinks = note.content.match(/\[\[([^\]]+)\]\]/g) || [];
          setBacklinks(wikilinks.map(link => {
            const title = link.replace(/\[\[|\]\]/g, '');
            return {
              id: title.toLowerCase().replace(/\s+/g, '-'),
              title,
              preview: `Links to: ${title}`
            };
          }));
        }
      }, [note]);

      return (
        <div className="backlinks-panel">
          <div className="sidebar-title">Backlinks ({backlinks.length})</div>
          {backlinks.length === 0 ? (
            <div style={{ color: 'var(--text-muted)', fontSize: '13px', padding: '12px' }}>
              No other notes link to this note yet.
            </div>
          ) : (
            backlinks.map(link => (
              <div key={link.id} className="backlink-item">
                <div className="backlink-title">📄 {link.title}</div>
                <div className="backlink-preview">{link.preview}</div>
              </div>
            ))
          )}

          <div style={{ marginTop: '24px' }}>
            <div className="sidebar-title">Linked Notes</div>
            {backlinks.map(link => (
              <div key={link.id} className="backlink-item">
                <div className="backlink-title">🔗 {link.title}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Command Palette
    function CommandPalette({ isOpen, onClose, onAction }) {
      const [query, setQuery] = useState('');
      const inputRef = useRef(null);

      useEffect(() => {
        if (isOpen && inputRef.current) {
          inputRef.current.focus();
        }
      }, [isOpen]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'k' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            onAction('new-note');
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [onClose, onAction]);

      if (!isOpen) return null;

      const actions = [
        { id: 'new-note', label: '📝 New Note', shortcut: 'Ctrl+N' },
        { id: 'search', label: '🔍 Search Notes', shortcut: 'Ctrl+K' },
        { id: 'daily', label: '📅 Daily Note', shortcut: 'Ctrl+D' },
        { id: 'graph', label: '🕸️ Graph View', shortcut: 'Ctrl+G' },
        { id: 'settings', label: '⚙️ Settings', shortcut: '' },
      ];

      const filtered = actions.filter(a =>
        a.label.toLowerCase().includes(query.toLowerCase())
      );

      return (
        <div className="quick-launcher active>
          <input
            ref={inputRef}
            type="text"
            placeholder="Type a command..."
            value={query}
            onChange={e => setQuery(e.target.value)}
          />
          <div className="quick-results">
            {filtered.map(action => (
              <div
                key={action.id}
                className="quick-result"
                onClick={() => { onAction(action.id); onClose(); }}
              >
                <div className="quick-result-title">{action.label}</div>
                {action.shortcut && (
                  <div className="quick-result-preview">{action.shortcut}</div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Status Bar
    function StatusBar({ stats }) {
      return (
        <div className="status-bar">
          <div className="status-item">
            <div className="status-dot"></div>
            <span>Connected to Xavier2</span>
          </div>
          <div className="status-item">
            <span>📊 {stats?.total_documents || 0} notes</span>
          </div>
          <div className="status-item">
            <span>💾 Local cache</span>
          </div>
        </div>
      );
    }

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [notes, setNotes] = useState([]);
      const [activeNote, setActiveNote] = useState(null);
      const [stats, setStats] = useState({});
      const [tags] = useState(['project', 'client', 'technical', 'sales', 'meeting']);
      const [showCommand, setShowCommand] = useState(false);
      const [searchResults, setSearchResults] = useState(null);

      // Load notes and stats on mount
      useEffect(() => {
        loadNotes();
        loadStats();

        // Keyboard shortcuts
        const handleKeyDown = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            setShowCommand(true);
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, []);

      const loadNotes = async () => {
        const results = await xavier2Api.searchNotes('note project');
        const parsed = results.map((r, i) => ({
          id: r.id || `note-${i}`,
          title: r.content?.split('\n')[0]?.replace(/^#\s*/, '') || 'Untitled',
          content: r.content || '',
          created_at: r.metadata?.created_at || Date.now()
        }));
        setNotes(parsed);
        if (parsed.length > 0 && !activeNote) {
          setActiveNote(parsed[0]);
        }
      };

      const loadStats = async () => {
        try {
          const s = await xavier2Api.getStats();
          setStats(s);
        } catch (e) {
          console.error('Failed to load stats:', e);
        }
      };

      const handleSearch = async (query) => {
        const results = await xavier2Api.searchNotes(query);
        setSearchResults(results);
      };

      const handleSaveNote = async (note) => {
        await xavier2Api.addNote(note.content, {
          ...note,
          title: note.title,
          category: 'note'
        });
        loadNotes();
      };

      const handleAction = (action) => {
        switch (action) {
          case 'new-note':
            const newNote = {
              id: `note-${Date.now()}`,
              title: '',
              content: '',
              created_at: Date.now()
            };
            setNotes(prev => [newNote, ...prev]);
            setActiveNote(newNote);
            break;
          case 'daily':
            const dailyNote = {
              id: `daily-${Date.now()}`,
              title: `Daily Note - ${new Date().toLocaleDateString()}`,
              content: `# ${new Date().toLocaleDateString()}\n\n## Tasks\n\n- [ ] \n\n## Notes\n\n`,
              created_at: Date.now()
            };
            setNotes(prev => [dailyNote, ...prev]);
            setActiveNote(dailyNote);
            break;
          default:
            break;
        }
      };

      return (
        <>
          <Header
            onSearch={handleSearch}
            onCommand={() => setShowCommand(true)}
          />
          <div className="main">
            <Sidebar
              notes={searchResults ? searchResults.map((r, i) => ({
                id: r.id || `sr-${i}`,
                title: r.content?.split('\n')[0]?.replace(/^#\s*/, '') || 'Result',
                content: r.content || ''
              })) : notes}
              activeNote={activeNote}
              onSelectNote={setActiveNote}
              tags={tags}
            />
            <Editor
              note={activeNote}
              onUpdate={(n) => setActiveNote(n)}
              onSave={handleSaveNote}
            />
            <BacklinksPanel note={activeNote} />
          </div>
          <StatusBar stats={stats} />
          <CommandPalette
            isOpen={showCommand}
            onClose={() => setShowCommand(false)}
            onAction={handleAction}
          />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
