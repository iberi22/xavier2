<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xavier — Design System Templates</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #09090b; color: #fafafa; min-height: 100vh; }
    :root {
      --bg: #09090b; --bg2: #18181b; --bg3: #27272a; --border: #3f3f46;
      --text: #fafafa; --text2: #a1a1aa; --text3: #71717a;
      --accent: #6366f1; --accent2: #4f46e5; --green: #22c55e;
      --yellow: #eab308; --red: #ef4444; --orange: #f97316;
      --purple: #a855f7; --blue: #3b82f6; --cyan: #06b6d4;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 16px; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 16px; }
    .sidebar-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text2); margin-bottom: 2px; transition: all 0.15s; }
    .sidebar-item:hover { background: var(--bg3); color: var(--text); }
    .sidebar-item.active { background: var(--accent); color: white; }
    .main { flex: 1; margin-left: 240px; padding: 20px; }
    .header { margin-bottom: 20px; }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
    .preview { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .preview-label { padding: 10px 14px; font-size: 12px; font-weight: 500; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
    .preview-label .tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--bg3); color: var(--text3); }
    .preview-demo { padding: 16px; min-height: 160px; }

    /* TEMPLATES */
    .t-metric { text-align: center; padding: 24px; background: linear-gradient(135deg, var(--bg3), var(--bg2)); border-radius: 10px; }
    .t-metric-val { font-size: 48px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .t-metric-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
    .t-metric-change { display: inline-block; margin-top: 8px; padding: 3px 8px; border-radius: 12px; font-size: 11px; }
    .t-metric-change.up { background: rgba(34,197,94,0.2); color: var(--green); }
    .t-metric-change.down { background: rgba(239,68,68,0.2); color: var(--red); }

    .t-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .t-stat { background: var(--bg3); border-radius: 8px; padding: 12px; text-align: center; }
    .t-stat-val { font-size: 20px; font-weight: 700; }
    .t-stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; margin-top: 3px; }

    .t-comparison { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
    .t-comp-side { background: var(--bg3); border-radius: 8px; padding: 14px; text-align: center; }
    .t-comp-title { font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
    .t-comp-val { font-size: 22px; font-weight: 700; }
    .t-comp-vs { font-size: 11px; color: var(--text3); font-weight: 600; }

    .t-timeline { position: relative; padding-left: 18px; }
    .t-timeline::before { content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
    .t-tl-item { position: relative; padding-bottom: 14px; }
    .t-tl-item::before { content: ''; position: absolute; left: -15px; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .t-tl-date { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
    .t-tl-title { font-size: 12px; font-weight: 600; }
    .t-tl-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .t-progress { display: flex; flex-direction: column; gap: 10px; }
    .t-prog-item { background: var(--bg3); border-radius: 6px; padding: 10px; }
    .t-prog-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
    .t-prog-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .t-prog-fill { height: 100%; border-radius: 3px; }

    .t-leader { background: var(--bg3); border-radius: 8px; overflow: hidden; }
    .t-leader-row { display: grid; grid-template-columns: 30px 1fr 50px; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; align-items: center; }
    .t-leader-row:last-child { border-bottom: none; }
    .t-leader-rank { font-weight: 700; }
    .t-leader-rank.g1 { color: #fbbf24; }
    .t-leader-rank.g2 { color: #9ca3af; }
    .t-leader-rank.g3 { color: #d97706; }
    .t-leader-val { text-align: right; font-weight: 600; }

    .t-report { background: var(--bg3); border-radius: 8px; padding: 16px; }
    .t-report-header { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .t-report-title { font-size: 16px; font-weight: 700; }
    .t-report-date { font-size: 10px; color: var(--text3); margin-top: 2px; }
    .t-report-sec { margin-bottom: 10px; }
    .t-report-sec-title { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; margin-bottom: 4px; }
    .t-report-sec p { font-size: 12px; line-height: 1.5; color: var(--text2); }

    .t-chart { background: var(--bg3); border-radius: 8px; padding: 14px; }
    .t-chart-title { font-size: 12px; font-weight: 600; margin-bottom: 12px; }
    .t-chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
    .t-chart-bar { flex: 1; background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 3px 3px 0 0; min-height: 4px; }
    .t-chart-label { font-size: 9px; color: var(--text3); text-align: center; margin-top: 4px; }

    .t-list { display: flex; flex-direction: column; gap: 6px; }
    .t-list-item { background: var(--bg3); border-radius: 6px; padding: 10px; display: flex; align-items: center; gap: 10px; }
    .t-list-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .t-list-content { flex: 1; }
    .t-list-title { font-size: 12px; font-weight: 500; }
    .t-list-sub { font-size: 10px; color: var(--text3); }

    .t-alert { border-radius: 8px; padding: 12px; display: flex; gap: 10px; align-items: flex-start; }
    .t-alert-icon { font-size: 16px; }
    .t-alert-content { flex: 1; }
    .t-alert-title { font-size: 12px; font-weight: 600; }
    .t-alert-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .t-alert.info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); }
    .t-alert.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
    .t-alert.warning { background: rgba(234,179,8,0.15); border: 1px solid rgba(234,179,8,0.3); }
    .t-alert.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }

    .t-check { background: var(--bg3); border-radius: 8px; padding: 10px; }
    .t-check-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .t-check-item:last-child { border-bottom: none; }
    .t-check-dot { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; }
    .t-check-dot.done { background: var(--green); border-color: var(--green); }
    .t-check.done { text-decoration: line-through; color: var(--text3); }

    .t-hero { background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 12px; padding: 30px; text-align: center; position: relative; overflow: hidden; }
    .t-hero-val { font-size: 52px; font-weight: 700; position: relative; }
    .t-hero-label { font-size: 16px; opacity: 0.9; margin-top: 6px; position: relative; }
    .t-hero-sub { font-size: 12px; opacity: 0.7; margin-top: 8px; position: relative; }

    .t-badge-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .t-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    .t-badge.blue { background: rgba(59,130,246,0.2); color: var(--blue); }
    .t-badge.green { background: rgba(34,197,94,0.2); color: var(--green); }
    .t-badge.yellow { background: rgba(234,179,8,0.2); color: var(--yellow); }
    .t-badge.red { background: rgba(239,68,68,0.2); color: var(--red); }
    .t-badge.purple { background: rgba(168,85,247,0.2); color: var(--purple); }

    .t-icon-stat { background: var(--bg3); border-radius: 8px; padding: 14px; display: flex; align-items: center; gap: 12px; }
    .t-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .t-icon-val { font-size: 20px; font-weight: 700; }
    .t-icon-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .t-pipeline { display: flex; flex-direction: column; gap: 6px; }
    .t-pipe-stage { display: flex; align-items: center; gap: 10px; }
    .t-pipe-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .t-pipe-bar { flex: 1; background: var(--bg3); padding: 8px 12px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 11px; }
    .t-pipe-line { width: 2px; height: 14px; background: var(--border); margin-left: 4px; }

    .t-mini { display: flex; flex-direction: column; gap: 4px; }
    .t-mini-item { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--bg3); border-radius: 4px; font-size: 11px; }
    .t-mini-val { font-weight: 600; }

    .t-divider { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 16px; align-items: center; background: var(--bg3); border-radius: 8px; padding: 16px; }
    .t-div-line { height: 100%; background: var(--border); }
    .t-div-stat { text-align: center; }
    .t-div-val { font-size: 26px; font-weight: 700; }
    .t-div-label { font-size: 10px; color: var(--text3); margin-top: 3px; }

    .t-spark { background: var(--bg3); border-radius: 8px; padding: 12px; }
    .t-spark-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .t-spark-title { font-size: 11px; font-weight: 600; }
    .t-spark-val { font-size: 16px; font-weight: 700; color: var(--green); }
    .t-spark-bars { display: flex; gap: 3px; height: 30px; align-items: flex-end; }
    .t-spark-bar { flex: 1; background: var(--accent); border-radius: 2px; min-height: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // ============ 20 TEMPLATE COMPONENTS ============

    function MetricBig({value="99.1%", label="Recall", change=2, up=true}) {
      return (
        <div className="t-metric">
          <div className="t-metric-val">{value}</div>
          <div className="t-metric-label">{label}</div>
          {change !== undefined && <span className={`t-metric-change ${up ? 'up' : 'down'}`}>{up ? '↑' : '↓'} {change}%</span>}
        </div>
      );
    }

    function StatsRow({items}) {
      return (
        <div className="t-stats">
          {(items||[{v:'415',l:'Memories'},{v:'99.1%',l:'Recall'},{v:'4.45/5',l:'Precision'},{v:'56ms',l:'Latency'}]).map((s,i)=>(
            <div key={i} className="t-stat">
              <div className="t-stat-val">{s.v}</div>
              <div className="t-stat-label">{s.l}</div>
            </div>
          ))}
        </div>
      );
    }

    function Comparison({left={v:'Xavier',l:'99.1%'}, right={v:'Mem0',l:'66.88%'}, vs='vs'}) {
      return (
        <div className="t-comparison">
          <div className="t-comp-side">
            <div className="t-comp-title">{left.l}</div>
            <div className="t-comp-val">{left.v}</div>
          </div>
          <div className="t-comp-vs">{vs}</div>
          <div className="t-comp-side">
            <div className="t-comp-title">{right.l}</div>
            <div className="t-comp-val">{right.v}</div>
          </div>
        </div>
      );
    }

    function Timeline({items}) {
      return (
        <div className="t-timeline">
          {(items||[{d:'Apr 5, 2026',t:'Xavier 99.1% recall',dd:'LoCoMo benchmark'},{d:'Apr 4, 2026',t:'Memory manager',dd:'Decay+consolidate+evict'},{d:'Apr 3, 2026',t:'SurrealDB v3',dd:'Upgrade complete'}]).map((item,i)=>(
            <div key={i} className="t-tl-item">
              <div className="t-tl-date">{item.d}</div>
              <div className="t-tl-title">{item.t}</div>
              {item.dd && <div className="t-tl-desc">{item.dd}</div>}
            </div>
          ))}
        </div>
      );
    }

    function Progress({items}) {
      return (
        <div className="t-progress">
          {(items||[{l:'Development',v:85,c:'var(--accent)'},{l:'Testing',v:60,c:'var(--yellow)'},{l:'Documentation',v:40,c:'var(--green)'}]).map((p,i)=>(
            <div key={i} className="t-prog-item">
              <div className="t-prog-header"><span>{p.l}</span><span>{p.v}%</span></div>
              <div className="t-prog-bar"><div className="t-prog-fill" style={{width:p.v+'%',background:p.c||'var(--accent)'}}></div></div>
            </div>
          ))}
        </div>
      );
    }

    function Leaderboard({items}) {
      return (
        <div className="t-leader">
          {(items||[{n:'ManteniApp',v:'100'},{n:'Xavier',v:'95'},{n:'Synapse',v:'87'},{n:'Edge Hive',v:'72'}]).map((l,i)=>(
            <div key={i} className="t-leader-row">
              <span className={`t-leader-rank ${i===0?'g1':i===1?'g2':i===2?'g3':''}`}>{i+1}</span>
              <span>{l.n}</span>
              <span className="t-leader-val">{l.v}</span>
            </div>
          ))}
        </div>
      );
    }

    function Report({title='Quarterly Report', date='Q1 2026', sections}) {
      return (
        <div className="t-report">
          <div className="t-report-header">
            <div className="t-report-title">{title}</div>
            <div className="t-report-date">{date}</div>
          </div>
          {(sections||[{t:'Summary',p:'Major improvements across all metrics.'},{t:'Key Achievements','p':'Launched Xavier with 99.1% recall.'},{t:'Next Steps','p':'Focus on enterprise features.'}]).map((s,i)=>(
            <div key={i} className="t-report-sec">
              <div className="t-report-sec-title">{s.t}</div>
              <p>{s.p}</p>
            </div>
          ))}
        </div>
      );
    }

    function ChartBar({title='Monthly', data}) {
      return (
        <div className="t-chart">
          <div className="t-chart-title">{title}</div>
          <div className="t-chart-bars">
            {(data||[{l:'Jan',v:40},{l:'Feb',v:60},{l:'Mar',v:75},{l:'Apr',v:90},{l:'May',v:85}]).map((d,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}}>
                <div className="t-chart-bar" style={{height:(d.v/Math.max(...(data||[{v:100}]).map(x=>x.v)))*80+'px'}}></div>
                <div className="t-chart-label">{d.l}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ListCards({items}) {
      return (
        <div className="t-list">
          {(items||[{i:'📊',t:'Xavier Memory',s:'AI-powered search'},{i:'🔒',t:'E2E Encryption',s:'AES-256-GCM'},{i:'🛡️',t:'Anticipator',s:'Prompt injection protection'}]).map((item,i)=>(
            <div key={i} className="t-list-item">
              <div className="t-list-icon">{item.i}</div>
              <div className="t-list-content">
                <div className="t-list-title">{item.t}</div>
                <div className="t-list-sub">{item.s}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function Alert({type='info', title='Info', desc='This is an alert message'}) {
      return (
        <div className={`t-alert ${type}`}>
          <div className="t-alert-icon">{type==='success'?'✅':type==='warning'?'⚠️':type==='error'?'❌':'ℹ️'}</div>
          <div className="t-alert-content">
            <div className="t-alert-title">{title}</div>
            <div className="t-alert-desc">{desc}</div>
          </div>
        </div>
      );
    }

    function Checklist({items}) {
      return (
        <div className="t-check">
          {(items||[{t:'Memory manager implemented',d:true},{t:'E2E encryption designed',d:true},{t:'Cloud deployment',d:false},{t:'Mobile app',d:false}]).map((item,i)=>(
            <div key={i} className="t-check-item">
              <div className={`t-check-dot ${item.d?'done':''}`}>{item.d?'✓':''}</div>
              <span className={item.d?'t-check done':'t-check'}>{item.t}</span>
            </div>
          ))}
        </div>
      );
    }

    function HeroBanner({value='99.1%', label='Recall Achieved', sub='Supassing industry benchmarks'}) {
      return (
        <div className="t-hero">
          <div className="t-hero-val">{value}</div>
          <div className="t-hero-label">{label}</div>
          {sub && <div className="t-hero-sub">{sub}</div>}
        </div>
      );
    }

    function BadgeRow({badges}) {
      return (
        <div className="t-badge-row">
          {(badges||['Xavier','Memory','AI','Secure','Fast']).map((b,i)=>(
            <span key={i} className={`t-badge ${['blue','green','purple','yellow'][i%4]}`}>{b}</span>
          ))}
        </div>
      );
    }

    function IconStat({icon='🧠', value='99.1%', label='Recall', color='var(--accent)'}) {
      return (
        <div className="t-icon-stat">
          <div className="t-icon" style={{background:color+'20'}}>{icon}</div>
          <div>
            <div className="t-icon-val" style={{color}}>{value}</div>
            <div className="t-icon-label">{label}</div>
          </div>
        </div>
      );
    }

    function Pipeline({stages}) {
      return (
        <div className="t-pipeline">
          {(stages||[{n:'Lead',c:120,co:'var(--blue)'},{n:'Qualified',c:80,co:'var(--yellow)'},{n:'Proposal',c:40,co:'var(--orange)'},{n:'Closed',c:20,co:'var(--green)'}]).map((s,i)=>(
            <div key={i}>
              <div className="t-pipe-stage">
                <div className="t-pipe-dot" style={{background:s.co}}></div>
                <div className="t-pipe-bar"><span>{s.n}</span><span>{s.c}</span></div>
              </div>
              {i<4-1 && <div className="t-pipe-line"></div>}
            </div>
          ))}
        </div>
      );
    }

    function Minilist({items}) {
      return (
        <div className="t-mini">
          {(items||[{l:'Memory',v:'415'},{l:'Recall',v:'99.1%'},{l:'Precision',v:'4.45/5'},{l:'Latency',v:'56ms'}]).map((item,i)=>(
            <div key={i} className="t-mini-item">
              <span className="t-mini-val">{item.l}</span>
              <span>{item.v}</span>
            </div>
          ))}
        </div>
      );
    }

    function DividerStats({left={v:'99.1%',l:'Recall'}, right={v:'4.45/5',l:'Precision'}}) {
      return (
        <div className="t-divider">
          <div className="t-div-stat"><div className="t-div-val" style={{color:'var(--accent)'}}>{left.v}</div><div className="t-div-label">{left.l}</div></div>
          <div className="t-div-line"></div>
          <div className="t-div-stat"><div className="t-div-val" style={{color:'var(--green)'}}>{right.v}</div><div className="t-div-label">{right.l}</div></div>
        </div>
      );
    }

    function Sparkline({value='+12%', data=[30,45,35,60,50,70,65,80]}) {
      return (
        <div className="t-spark">
          <div className="t-spark-header"><span className="t-spark-title">Trend</span><span className="t-spark-val">{value}</span></div>
          <div className="t-spark-bars">{data.map((d,i)=><div key={i} className="t-spark-bar" style={{height:(d/Math.max(...data))*100+'%'}}></div>)}</div>
        </div>
      );
    }

    // ============ APP ============
    const templates = [
      { id:'metric', name:'Metric Big', icon:'🔢', desc:'Hero number with gradient', component:MetricBig },
      { id:'stats', name:'Stats Row', icon:'📊', desc:'4 KPI boxes', component:StatsRow },
      { id:'comparison', name:'Comparison', icon:'⚖️', desc:'A vs B', component:Comparison },
      { id:'timeline', name:'Timeline', icon:'📅', desc:'Events over time', component:Timeline },
      { id:'progress', name:'Progress', icon:'📈', desc:'Goals with bars', component:Progress },
      { id:'leader', name:'Leaderboard', icon:'🏆', desc:'Rankings', component:Leaderboard },
      { id:'report', name:'Report', icon:'📄', desc:'Document sections', component:Report },
      { id:'chart', name:'Bar Chart', icon:'📊', desc:'Simple bars', component:ChartBar },
      { id:'list', name:'List Cards', icon:'📋', desc:'Icon + text cards', component:ListCards },
      { id:'alert', name:'Alert', icon:'ℹ️', desc:'Info/Warning/Error', component:Alert },
      { id:'check', name:'Checklist', icon:'☑️', desc:'Tasks with status', component:Checklist },
      { id:'hero', name:'Hero Banner', icon:'🌟', desc:'Gradient hero', component:HeroBanner },
      { id:'badge', name:'Badge Row', icon:'🏷️', desc:'Tags/badges', component:BadgeRow },
      { id:'icon', name:'Icon Stat', icon:'🔢', desc:'Icon + big number', component:IconStat },
      { id:'pipeline', name:'Pipeline', icon:'🔄', desc:'Funnel/stages', component:Pipeline },
      { id:'mini', name:'Minilist', icon:'📝', desc:'Simple key/value', component:Minilist },
      { id:'divider', name:'Divider Stats', icon:'➗', desc:'Side by side', component:DividerStats },
      { id:'spark', name:'Sparkline', icon:'📈', desc:'Mini trend', component:Sparkline },
    ];

    const categories = {
      'Metrics': ['metric','stats','hero','icon','divider','spark','mini'],
      'Data': ['chart','progress','leader','pipeline'],
      'Lists': ['list','timeline','check'],
      'Docs': ['report','comparison'],
      'Alerts': ['alert','badge'],
    };

    function App() {
      const [cat, setCat] = useState('All');
      const allIds = Object.values(categories).flat();
      const filtered = cat === 'All' ? templates : templates.filter(t => categories[cat]?.includes(t.id));

      return (
        <div className="app">
          <div className="sidebar">
            <div className="sidebar-title">Categories</div>
            <div className={`sidebar-item ${cat==='All'?'active':''}`} onClick={()=>setCat('All')}>All Templates</div>
            {Object.keys(categories).map(c => (
              <div key={c}>
                <div className="sidebar-title">{c}</div>
                <div className={`sidebar-item ${cat===c?'active':''}`} onClick={()=>setCat(c)}>{c}</div>
              </div>
            ))}
          </div>
          <div className="main">
            <div className="header">
              <h1>🧠 Xavier Design System</h1>
              <p>20 pre-built infographic templates — AI fills with data, no generation cost</p>
            </div>
            <div className="grid">
              {filtered.map(t => (
                <div key={t.id} className="preview">
                  <div className="preview-label">{t.icon} {t.name} <span className="tag">{t.desc}</span></div>
                  <div className="preview-demo">
                    <t.component />
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
