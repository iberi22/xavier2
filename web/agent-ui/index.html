<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xavier Agent UI</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a25;
      --border: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-secondary: #9090a0;
      --text-muted: #606070;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --orange: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
    .header-logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
    .header-logo .icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), #a855f7); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .model-badge { font-size: 11px; background: var(--bg-tertiary); padding: 4px 8px; border-radius: 4px; color: var(--text-secondary); }

    /* Chat area */
    .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* Messages */
    .message { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; }
    .message.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .message.agent { align-self: flex-start; background: var(--bg-secondary); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message .sender { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
    .message.agent .sender { color: var(--accent); }

    /* UI Generation Indicator */
    .ui-generating { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; align-self: flex-start; }
    .ui-generating .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Generated UI Container */
    .generated-ui { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 8px; }
    .generated-ui-header { background: var(--bg-tertiary); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .generated-ui-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .generated-ui-body { padding: 16px; }

    /* Kanban Board */
    .kanban { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
    .kanban-column { min-width: 280px; background: var(--bg-tertiary); border-radius: 12px; padding: 12px; flex-shrink: 0; }
    .kanban-column-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .kanban-column-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .kanban-column-count { background: var(--bg-primary); padding: 2px 8px; border-radius: 10px; font-size: 11px; color: var(--text-secondary); }
    .kanban-cards { display: flex; flex-direction: column; gap: 8px; }
    .kanban-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
    .kanban-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .kanban-card-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .kanban-card-meta { display: flex; gap: 8px; font-size: 11px; color: var(--text-muted); }
    .kanban-card-priority { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
    .priority-high { background: rgba(239,68,68,0.2); color: var(--red); }
    .priority-medium { background: rgba(249,115,22,0.2); color: var(--orange); }
    .priority-low { background: rgba(34,197,94,0.2); color: var(--green); }

    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .stat-card { background: var(--bg-tertiary); border-radius: 12px; padding: 20px; }
    .stat-card-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card-value { font-size: 32px; font-weight: 700; }
    .stat-card-change { font-size: 12px; margin-top: 4px; }
    .stat-card-change.positive { color: var(--green); }
    .stat-card-change.negative { color: var(--red); }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 10px 12px; background: var(--bg-tertiary); font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .data-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .data-table tr:hover td { background: var(--bg-tertiary); }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 12px; }
    .timeline-item { display: flex; gap: 12px; }
    .timeline-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .timeline-content { background: var(--bg-tertiary); padding: 12px 16px; border-radius: 8px; flex: 1; }
    .timeline-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .timeline-title { font-size: 14px; font-weight: 500; }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text-primary); font-size: 14px; outline: none; }
    .form-input:focus { border-color: var(--accent); }
    .form-textarea { min-height: 100px; resize: vertical; }
    .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: var(--accent-hover); }

    /* Chat Input */
    .input-area { padding: 16px 20px; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-end; }
    .input-wrapper { flex: 1; position: relative; }
    .input-area textarea { width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text-primary); font-size: 14px; resize: none; outline: none; min-height: 48px; max-height: 200px; }
    .input-area textarea:focus { border-color: var(--accent); }
    .input-actions { display: flex; gap: 8px; }
    .input-btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .input-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .input-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .input-btn.primary:hover { background: var(--accent-hover); }

    /* Templates */
    .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .template-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .template-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .template-card .icon { font-size: 32px; margin-bottom: 8px; }
    .template-card .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .template-card .desc { font-size: 12px; color: var(--text-muted); }

    /* Loading dots */
    .loading-dots { display: flex; gap: 4px; }
    .loading-dots span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============================================
    // XAVIER API
    // ============================================
    const XAVIER_URL = 'http://localhost:8003';
    const XAVIER_TOKEN = 'dev-token';

    // ============================================
    // UI TEMPLATES (Generative)
    // ============================================

    // Kanban Board Template
    function KanbanBoard({ data }) {
      const columns = data?.columns || [
        { id: 'backlog', title: 'Backlog', color: '#606070', items: [] },
        { id: 'todo', title: 'To Do', color: '#f97316', items: [] },
        { id: 'progress', title: 'In Progress', color: '#eab308', items: [] },
        { id: 'done', title: 'Done', color: '#22c55e', items: [] },
      ];

      return (
        <div className="kanban">
          {columns.map(col => (
            <div key={col.id} className="kanban-column">
              <div className="kanban-column-header">
                <div className="kanban-column-title">
                  <span style={{color: col.color}}>●</span>
                  {col.title}
                </div>
                <span className="kanban-column-count">{col.items.length}</span>
              </div>
              <div className="kanban-cards">
                {col.items.map((item, i) => (
                  <div key={i} className="kanban-card">
                    <div className="kanban-card-title">{item.title}</div>
                    <div className="kanban-card-meta">
                      <span className={`kanban-card-priority priority-${item.priority}`}>{item.priority}</span>
                      <span>{item.assignee}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // Stats Grid Template
    function StatsGrid({ data }) {
      return (
        <div className="stats-grid">
          {data?.cards?.map((card, i) => (
            <div key={i} className="stat-card">
              <div className="stat-card-label">{card.label}</div>
              <div className="stat-card-value" style={{color: card.color || 'var(--text-primary)'}}>{card.value}</div>
              {card.change && (
                <div className={`stat-card-change ${card.change > 0 ? 'positive' : 'negative'}`}>
                  {card.change > 0 ? '↑' : '↓'} {Math.abs(card.change)}%
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    // Table Template
    function DataTable({ data }) {
      return (
        <table className="data-table">
          <thead>
            <tr>
              {data?.columns?.map((col, i) => <th key={i}>{col}</th>)}
            </tr>
          </thead>
          <tbody>
            {data?.rows?.map((row, i) => (
              <tr key={i}>
                {row.map((cell, j) => <td key={j}>{cell}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      );
    }

    // Timeline Template
    function TimelineView({ data }) {
      return (
        <div className="timeline">
          {data?.items?.map((item, i) => (
            <div key={i} className="timeline-item">
              <div className="timeline-dot"></div>
              <div className="timeline-content">
                <div className="timeline-date">{item.date}</div>
                <div className="timeline-title">{item.title}</div>
                {item.description && <p style={{fontSize: '13px', color: 'var(--text-secondary)', marginTop: '4px'}}>{item.description}</p>}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // Form Template
    function DynamicForm({ data, onSubmit }) {
      const [formData, setFormData] = useState({});

      const handleSubmit = (e) => {
        e.preventDefault();
        onSubmit?.(formData);
      };

      return (
        <form onSubmit={handleSubmit}>
          {data?.fields?.map((field, i) => (
            <div key={i} className="form-group">
              <label className="form-label">{field.label}</label>
              {field.type === 'textarea' ? (
                <textarea className="form-input form-textarea" placeholder={field.placeholder} />
              ) : (
                <input type={field.type || 'text'} className="form-input" placeholder={field.placeholder} />
              )}
            </div>
          ))}
          <button type="submit" className="btn">{data?.submitLabel || 'Submit'}</button>
        </form>
      );
    }

    // ============================================
    // UI RENDERER
    // ============================================
    function UIRenderer({ ui }) {
      if (!ui) return null;

      switch (ui.type) {
        case 'kanban':
          return <KanbanBoard data={ui.data} />;
        case 'stats':
          return <StatsGrid data={ui.data} />;
        case 'table':
          return <DataTable data={ui.data} />;
        case 'timeline':
          return <TimelineView data={ui.data} />;
        case 'form':
          return <DynamicForm data={ui.data} />;
        default:
          return <div style={{color: 'var(--text-muted)'}}>Unknown UI type: {ui.type}</div>;
      }
    }

    // ============================================
    // TEMPLATE SELECTOR
    // ============================================
    function TemplateSelector({ onSelect }) {
      const templates = [
        { id: 'kanban', icon: '📋', title: 'Kanban Board', desc: 'Tasks in columns' },
        { id: 'stats', icon: '📊', title: 'Stats Dashboard', desc: 'Metrics & KPIs' },
        { id: 'table', icon: '📋', title: 'Data Table', desc: 'Structured data' },
        { id: 'timeline', icon: '📅', title: 'Timeline', desc: 'Chronological events' },
        { id: 'form', icon: '📝', title: 'Form', desc: 'Data entry' },
        { id: 'notes', icon: '📝', title: 'Notes', desc: 'Like Obsidian' },
      ];

      return (
        <div className="generated-ui">
          <div className="generated-ui-header">
            <div className="generated-ui-title">📋 Choose a Template</div>
          </div>
          <div className="generated-ui-body">
            <div className="template-grid">
              {templates.map(t => (
                <div key={t.id} className="template-card" onClick={() => onSelect(t.id)}>
                  <div className="icon">{t.icon}</div>
                  <div className="title">{t.title}</div>
                  <div className="desc">{t.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [messages, setMessages] = useState([
        {
          id: 0,
          sender: 'agent',
          text: '🧠 Hi! I\'m Xavier Agent. Tell me what UI you want to generate, like:',
          examples: [
            '"Show me a Kanban board for my project"',
            '"Create a notes app like Obsidian"',
            '"Build a dashboard with stats"',
            '"Make a timeline of my meetings"',
          ]
        }
      ]);
      const [input, setInput] = useState('');
      const [generating, setGenerating] = useState(false);
      const [currentUI, setCurrentUI] = useState(null);
      const [selectedTemplate, setSelectedTemplate] = useState(null);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, currentUI]);

      const generateResponse = async (userMessage) => {
        setGenerating(true);

        // Simulate AI thinking + UI generation
        await new Promise(r => setTimeout(r, 1000));

        const msg = userMessage.toLowerCase();
        let response = '';
        let ui = null;

        // Kanban detection
        if (msg.includes('kanban') || msg.includes('board') || msg.includes('tasks') || msg.includes('project')) {
          response = '📋 Here\'s your Kanban board generated on-demand:';
          ui = {
            type: 'kanban',
            data: {
              columns: [
                { id: 'backlog', title: 'Backlog', color: '#606070', items: [
                  { title: 'Research competitor pricing', priority: 'medium', assignee: 'BELA' },
                  { title: 'Write documentation', priority: 'low', assignee: 'BELA' },
                ]},
                { id: 'todo', title: 'To Do', color: '#f97316', items: [
                  { title: 'Deploy to Cloud Run', priority: 'high', assignee: 'BELA' },
                  { title: 'Set up monitoring', priority: 'medium', assignee: 'BELA' },
                ]},
                { id: 'progress', title: 'In Progress', color: '#eab308', items: [
                  { title: 'Build chat UI', priority: 'high', assignee: 'BELA' },
                ]},
                { id: 'done', title: 'Done', color: '#22c55e', items: [
                  { title: 'Xavier benchmark 99.1%', priority: 'high', assignee: 'BELA' },
                  { title: 'Memory manager implemented', priority: 'high', assignee: 'BELA' },
                ]},
              ]
            }
          };
        }
        // Stats dashboard
        else if (msg.includes('dashboard') || msg.includes('stats') || msg.includes('metrics') || msg.includes('kpi')) {
          response = '📊 Your stats dashboard:';
          ui = {
            type: 'stats',
            data: {
              cards: [
                { label: 'Total Memories', value: '415', change: 12 },
                { label: 'Recall', value: '99.1%', color: '#22c55e', change: 2 },
                { label: 'Precision', value: '4.45/5', color: '#6366f1', change: 8 },
                { label: 'Active Projects', value: '7', change: 0 },
                { label: 'API Calls Today', value: '1,234', change: 23 },
                { label: 'Avg Latency', value: '56ms', color: '#22c55e', change: -15 },
              ]
            }
          };
        }
        // Timeline
        else if (msg.includes('timeline') || msg.includes('history') || msg.includes('meetings')) {
          response = '📅 Here\'s your timeline:';
          ui = {
            type: 'timeline',
            data: {
              items: [
                { date: '2026-04-05', title: 'Xavier 99.1% recall achieved', description: 'LoCoMo benchmark surpassed' },
                { date: '2026-04-04', title: 'Memory manager implemented', description: 'Decay, consolidate, evict' },
                { date: '2026-04-03', title: 'SurrealDB upgrade to v3', description: 'Protocol fix applied' },
                { date: '2026-04-01', title: 'pplx-embed fixed', description: 'Restarted service' },
              ]
            }
          };
        }
        // Table
        else if (msg.includes('table') || msg.includes('list all') || msg.includes('data')) {
          response = '📋 Here\'s your data table:';
          ui = {
            type: 'table',
            data: {
              columns: ['Project', 'Status', 'Priority', 'Due'],
              rows: [
                ['ManteniApp', 'Active', 'High', '2026-04-10'],
                ['Xavier', 'Testing', 'High', '2026-04-08'],
                ['Tripro Landing', 'Done', 'Medium', '2026-04-01'],
                ['Synapse Trader', 'Active', 'Medium', 'Ongoing'],
              ]
            }
          };
        }
        // Notes/Form
        else if (msg.includes('note') || msg.includes('obsidian') || msg.includes('notes')) {
          response = '📝 Here\'s your notes interface (like Obsidian):';
          ui = {
            type: 'notes',
            data: {}
          };
        }
        // Generic response
        else {
          response = `I can generate:\n\n• **Kanban Board** — "show me a kanban for my project"\n• **Stats Dashboard** — "create a dashboard with stats"\n• **Timeline** — "show me a timeline of my events"\n• **Data Table** — "make a table of my data"\n• **Notes App** — "create a notes app like Obsidian"\n\nWhat would you like?`;
        }

        // Add response message
        setMessages(prev => [...prev, {
          id: Date.now(),
          sender: 'agent',
          text: response,
          ui: ui
        }]);

        setGenerating(false);
      };

      const handleSend = async () => {
        if (!input.trim() || generating) return;

        const userMsg = { id: Date.now(), sender: 'user', text: input.trim() };
        setMessages(prev => [...prev, userMsg]);
        setInput('');

        await generateResponse(input.trim());
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      return (
        <>
          {/* Header */}
          <div className="header">
            <div className="header-logo">
              <div className="icon">🧠</div>
              <span>Xavier Agent UI</span>
            </div>
            <span className="model-badge">MiniMax-M2.7</span>
          </div>

          {/* Chat Area */}
          <div className="chat-area">
            {messages.map(msg => (
              <div key={msg.id} className={`message ${msg.sender}`}>
                <div className="sender">{msg.sender === 'agent' ? '🧠 Xavier' : '👤 You'}</div>
                <div>{msg.text}</div>

                {/* Show examples on first message */}
                {msg.examples && (
                  <div style={{marginTop: '12px', display: 'flex', flexDirection: 'column', gap: '6px'}}>
                    {msg.examples.map((ex, i) => (
                      <div
                        key={i}
                        style={{fontSize: '13px', color: 'var(--accent)', cursor: 'pointer', padding: '6px 10px', background: 'var(--bg-tertiary)', borderRadius: '6px'}}
                        onClick={() => { setInput(ex); }}
                      >
                        {ex}
                      </div>
                    ))}
                  </div>
                )}

                {/* Render generated UI */}
                {msg.ui && (
                  <div className="generated-ui">
                    <div className="generated-ui-header">
                      <div className="generated-ui-title">✨ Generated UI</div>
                      <button style={{background: 'transparent', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '12px'}}>Export</button>
                    </div>
                    <div className="generated-ui-body">
                      <UIRenderer ui={msg.ui} />
                    </div>
                  </div>
                )}
              </div>
            ))}

            {/* Generating indicator */}
            {generating && (
              <div className="message agent">
                <div className="sender">🧠 Xavier</div>
                <div className="ui-generating">
                  <div className="spinner"></div>
                  <span>Generating UI...</span>
                </div>
              </div>
            )}

            <div ref={messagesEndRef} />
          </div>

          {/* Input Area */}
          <div className="input-area">
            <div className="input-wrapper">
              <textarea
                placeholder="Tell me what UI to generate... (e.g., 'show me a kanban board')"
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={handleKeyPress}
                rows={1}
              />
            </div>
            <div className="input-actions">
              <button className="input-btn primary" onClick={handleSend} disabled={!input.trim() || generating}>
                Generate
              </button>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
