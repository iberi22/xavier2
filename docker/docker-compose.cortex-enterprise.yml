version: '3.8'

services:
  xavier:
    image: xavier:${XAVIER_IMAGE_TAG:-0.4.1}
    container_name: xavier-enterprise
    ports:
      - "8003:8003"
    environment:
      - XAVIER_MODE=enterprise
      - XAVIER_AUTH_ENABLED=true
      - XAVIER_API_KEY=${XAVIER_API_KEY:-}
      - XAVIER_MCP_ENABLED=true
      - XAVIER_MEMORY_STORE=surreal
      - XAVIER_DB_ENDPOINT=mem://
      - XAVIER_LOG_LEVEL=${XAVIER_LOG_LEVEL:-info}
      - XAVIER_ROUTER_RETRIEVED_MODEL=${XAVIER_ROUTER_RETRIEVED_MODEL:-}
      - XAVIER_ROUTER_COMPLEX_MODEL=${XAVIER_ROUTER_COMPLEX_MODEL:-}
    networks:
      - xavier-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-xavier
    command: tunnel --config /etc/cloudflared/Xavierfile run
    volumes:
      - ./cloudflared:/etc/cloudflared
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - xavier-network
    depends_on:
      - xavier
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  xavier-network:
    driver: bridge
