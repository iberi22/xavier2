version: '3.8'

services:
  xavier2:
    image: xavier2:${XAVIER2_IMAGE_TAG:-0.4.1}
    container_name: xavier2-enterprise
    ports:
      - "8003:8003"
    environment:
      - XAVIER2_MODE=enterprise
      - XAVIER2_AUTH_ENABLED=true
      - XAVIER2_API_KEY=${XAVIER2_API_KEY:-}
      - XAVIER2_MCP_ENABLED=true
      - XAVIER2_MEMORY_STORE=surreal
      - XAVIER2_DB_ENDPOINT=mem://
      - XAVIER2_LOG_LEVEL=${XAVIER2_LOG_LEVEL:-info}
      - XAVIER2_ROUTER_RETRIEVED_MODEL=${XAVIER2_ROUTER_RETRIEVED_MODEL:-}
      - XAVIER2_ROUTER_COMPLEX_MODEL=${XAVIER2_ROUTER_COMPLEX_MODEL:-}
    networks:
      - xavier2-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-xavier2
    command: tunnel --config /etc/cloudflared/Xavier2file run
    volumes:
      - ./cloudflared:/etc/cloudflared
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - xavier2-network
    depends_on:
      - xavier2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  xavier2-network:
    driver: bridge
