version: '3.8'

services:
  xavier:
    image: iberi22/xavier:latest
    container_name: xavier-memory
    #network_mode: host  # DISABLED - causes crash loop on Windows Docker Desktop
    ports:
      - "8006:8006"
    environment:
      - XAVIER_PORT=8006
      - RUST_LOG=info
      - XAVIER_STORAGE=/data/memory
    volumes:
      - xavier-data:/data/memory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for vector storage (if needed)
  redis:
    image: redis:7-alpine
    container_name: xavier-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  xavier-data:
  redis-data:
