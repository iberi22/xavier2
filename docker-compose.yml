services:
  # Xavier Memory Server (standalone - no pplx-embed dependency)
  xavier:
    build:
      context: .
      dockerfile: Dockerfile
    image: xavier:${XAVIER_IMAGE_TAG:-0.4.1}
    container_name: xavier
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      - XAVIER_PORT=8006
      - XAVIER_HOST=0.0.0.0
      - XAVIER_CODE_GRAPH_DB_PATH=/data/code_graph.db
      - XAVIER_TOKEN=${XAVIER_TOKEN:?Set XAVIER_TOKEN in .env before starting Docker}
      - XAVIER_MEMORY_BACKEND=${XAVIER_MEMORY_BACKEND:-vec}
      - XAVIER_WORKSPACE_DIR=/data/workspaces
      - RUST_LOG=${RUST_LOG:-info}
      - XAVIER_LOG_LEVEL=${XAVIER_LOG_LEVEL:-info}
      # SQLite-vec paths (used when XAVIER_MEMORY_BACKEND=vec)
      - XAVIER_MEMORY_SQLITE_PATH=/data/memory-store.sqlite3
      - XAVIER_MEMORY_VEC_PATH=/data/vec-store.sqlite3
      # SurrealDB (only used when XAVIER_MEMORY_BACKEND=surreal)
      - XAVIER_SURREALDB_URL=${XAVIER_SURREALDB_URL:-ws://surrealdb:8000}
      - XAVIER_SURREALDB_NS=${XAVIER_SURREALDB_NS:-xavier}
      - XAVIER_SURREALDB_DB=${XAVIER_SURREALDB_DB:-memory}
      - XAVIER_SURREALDB_USER=${XAVIER_SURREALDB_USER:-}
      - XAVIER_SURREALDB_PASS=${XAVIER_SURREALDB_PASS:-}
      # Embeddings: Use local Ollama (no Docker network dependency)
      # For Mac/Windows: host.docker.internal. For Linux: set OLLAMA_HOST to host IP
      - XAVIER_EMBEDDING_URL=${XAVIER_EMBEDDING_URL:-http://host.docker.internal:11434/v1}
      - XAVIER_EMBEDDING_MODEL=${XAVIER_EMBEDDING_MODEL:-nomic-embed-text}
      # LLM: Use local Ollama fallback
      - XAVIER_LOCAL_LLM_URL=${XAVIER_LOCAL_LLM_URL:-http://host.docker.internal:11434/v1}
      - XAVIER_LOCAL_LLM_MODEL=${XAVIER_LOCAL_LLM_MODEL:-qwen:0.5b}
      # Model Provider (local, gemini, openai, minimax, anthropic)
      - XAVIER_MODEL_PROVIDER=${XAVIER_MODEL_PROVIDER:-local}
      # Model routing (optional overrides)
      - XAVIER_ROUTER_RETRIEVED_MODEL=${XAVIER_ROUTER_RETRIEVED_MODEL:-}
      - XAVIER_ROUTER_COMPLEX_MODEL=${XAVIER_ROUTER_COMPLEX_MODEL:-}
      # CRITICAL: Disable HyDE (avoids extra embedding calls)
      - XAVIER_DISABLE_HYDE=${XAVIER_DISABLE_HYDE:-1}
      - X-CORTEX-TOKEN=${X_CORTEX_TOKEN}
      # Xavier sync check settings
      - XAVIER_SYNC_INTERVAL_MS=${XAVIER_SYNC_INTERVAL_MS:-300000}
      - XAVIER_SYNC_LAG_THRESHOLD_MS=${XAVIER_SYNC_LAG_THRESHOLD_MS:-30000}
      - XAVIER_SYNC_SAVE_OK_RATE_THRESHOLD=${XAVIER_SYNC_SAVE_OK_RATE_THRESHOLD:-0.95}
      - XAVIER_SYNC_MAX_RETRIES=${XAVIER_SYNC_MAX_RETRIES:-3}
      - XAVIER_SYNC_RETRY_DELAY_MS=${XAVIER_SYNC_RETRY_DELAY_MS:-1000}
      - XAVIER_WORKSPACE_ID=default
    volumes:
      - xavier_data:/data
      - xavier_logs:/logs
      # Portable workspace mount for smoke tests
      - ./:/mnt/workspaces/xavier:ro
    networks:
      - xavier_network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "xavier.version=${XAVIER_IMAGE_TAG:-0.4.1}"
      - "xavier.service=memory"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  surrealdb:
    image: surrealdb/surrealdb:v3.0.5
    container_name: surrealdb
    restart: unless-stopped
    command: >
      start rocksdb:///data/surreal
      --user ${XAVIER_SURREALDB_USER:?XAVIER_SURREALDB_USER required}
      --pass ${XAVIER_SURREALDB_PASS:?XAVIER_SURREALDB_PASS required}
      --bind 0.0.0.0:8000
    user: "0:0"
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - SURREALDB_USER=${XAVIER_SURREALDB_USER}
      - SURREALDB_PASS=${XAVIER_SURREALDB_PASS}
      - SURREALDB_PATH=/data/surreal
    volumes:
      - surreal_data:/data
    networks:
      - xavier_network
    profiles:
      - surreal
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "surrealdb.version=v3.0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  xavier_network:
    name: xavier_network
    driver: bridge

volumes:
  xavier_data:
    name: xavier_data
  xavier_logs:
    name: xavier_logs
  surreal_data:
    name: surreal_data
