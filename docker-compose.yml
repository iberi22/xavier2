services:
  # Xavier2 Memory Server (standalone - no pplx-embed dependency)
  xavier2:
    build:
      context: .
      dockerfile: Dockerfile
    image: xavier2:${XAVIER2_IMAGE_TAG:-0.4.1}
    container_name: xavier2
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - XAVIER2_PORT=8003
      - XAVIER2_HOST=0.0.0.0
      - XAVIER2_CODE_GRAPH_DB_PATH=/data/code_graph.db
      - XAVIER2_TOKEN=${XAVIER2_TOKEN:?Set XAVIER2_TOKEN in .env before starting Docker}
      - XAVIER2_MEMORY_BACKEND=${XAVIER2_MEMORY_BACKEND:-vec}
      - XAVIER2_WORKSPACE_DIR=/data/workspaces
      - RUST_LOG=${RUST_LOG:-info}
      - XAVIER2_LOG_LEVEL=${XAVIER2_LOG_LEVEL:-info}
      # SQLite-vec paths (used when XAVIER2_MEMORY_BACKEND=vec)
      - XAVIER2_MEMORY_SQLITE_PATH=/data/memory-store.sqlite3
      - XAVIER2_MEMORY_VEC_PATH=/data/vec-store.sqlite3
      # SurrealDB (only used when XAVIER2_MEMORY_BACKEND=surreal)
      - XAVIER2_SURREALDB_URL=${XAVIER2_SURREALDB_URL:-ws://surrealdb:8000}
      - XAVIER2_SURREALDB_NS=${XAVIER2_SURREALDB_NS:-xavier2}
      - XAVIER2_SURREALDB_DB=${XAVIER2_SURREALDB_DB:-memory}
      - XAVIER2_SURREALDB_USER=${XAVIER2_SURREALDB_USER:-}
      - XAVIER2_SURREALDB_PASS=${XAVIER2_SURREALDB_PASS:-}
      # Embeddings: Use local Ollama (no Docker network dependency)
      # For Mac/Windows: host.docker.internal. For Linux: set OLLAMA_HOST to host IP
      - XAVIER2_EMBEDDING_URL=${XAVIER2_EMBEDDING_URL:-http://host.docker.internal:11434/v1}
      - XAVIER2_EMBEDDING_MODEL=${XAVIER2_EMBEDDING_MODEL:-nomic-embed-text}
      # LLM: Use local Ollama fallback
      - XAVIER2_LOCAL_LLM_URL=${XAVIER2_LOCAL_LLM_URL:-http://host.docker.internal:11434/v1}
      - XAVIER2_LOCAL_LLM_MODEL=${XAVIER2_LOCAL_LLM_MODEL:-qwen:0.5b}
      # Model Provider (local, gemini, openai, minimax, anthropic)
      - XAVIER2_MODEL_PROVIDER=${XAVIER2_MODEL_PROVIDER:-local}
      # Model routing (optional overrides)
      - XAVIER2_ROUTER_RETRIEVED_MODEL=${XAVIER2_ROUTER_RETRIEVED_MODEL:-}
      - XAVIER2_ROUTER_COMPLEX_MODEL=${XAVIER2_ROUTER_COMPLEX_MODEL:-}
      # CRITICAL: Disable HyDE (avoids extra embedding calls)
      - XAVIER2_DISABLE_HYDE=${XAVIER2_DISABLE_HYDE:-1}
    volumes:
      - xavier2_data:/data
      - xavier2_logs:/logs
      # Portable workspace mount for smoke tests
      - ./:/mnt/workspaces/xavier2:ro
    networks:
      - xavier2_network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "xavier2.version=${XAVIER2_IMAGE_TAG:-0.4.1}"
      - "xavier2.service=memory"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # Optional: uncomment resource limits for production
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #     reservations:
    #       memory: 256M

  # Optional: pplx-embed service (REMOVED - use local Ollama instead)
  # To enable pplx-embed, use: docker compose --profile pplx up -d
  # pplx-embed:
  #   image: southwestailabs/pplx-embed:latest
  #   container_name: pplx-embed
  #   restart: unless-stopped
  #   ports:
  #     - "8002:8000"
  #   environment:
  #     - PORT=8000
  #     - MODEL_NAME=${XAVIER2_EMBEDDING_MODEL:-perplexity-ai/pplx-embed-v1-0.6b}
  #     - DEVICE=${PPLX_EMBED_DEVICE:-cpu}
  #     - TRANSFORMERS_CACHE=/models
  #   volumes:
  #     - pplx_embed_models:/models
  #   networks:
  #     - xavier2_network
  #   profiles:
  #     - pplx
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "-X", "POST", "http://localhost:8000/v1/embeddings", "-H", "Content-Type: application/json", "-d", "{\"input\":\"health\",\"model\":\"perplexity-ai/pplx-embed-v1-0.6b\"}"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 120s

  # SurrealDB Database (optional - enable with: docker compose --profile surreal up -d)
  surrealdb:
    image: surrealdb/surrealdb:v3.0.5
    container_name: surrealdb
    restart: unless-stopped
    command: >
      start rocksdb:///data/surreal
      --user ${XAVIER2_SURREALDB_USER:?XAVIER2_SURREALDB_USER required}
      --pass ${XAVIER2_SURREALDB_PASS:?XAVIER2_SURREALDB_PASS required}
      --bind 0.0.0.0:8000
    user: "0:0"
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - SURREALDB_USER=${XAVIER2_SURREALDB_USER}
      - SURREALDB_PASS=${XAVIER2_SURREALDB_PASS}
      - SURREALDB_PATH=/data/surreal
    volumes:
      - surreal_data:/data
    networks:
      - xavier2_network
    profiles:
      - surreal
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "surrealdb.version=v3.0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - xavier2_network
    profiles:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - xavier2_network
    profiles:
      - monitoring
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  xavier2_network:
    name: xavier2_network
    driver: bridge

volumes:
  xavier2_data:
    name: xavier2_data
  xavier2_logs:
    name: xavier2_logs
  surreal_data:
    name: surreal_data
  prometheus_data:
    name: prometheus_data
  grafana_data:
    name: grafana_data
