services:
  xavier2:
    image: xavier2:latest
    container_name: xavier2
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      # Required auth token for all protected Xavier2 endpoints.
      XAVIER2_TOKEN: ${XAVIER2_TOKEN:?Set XAVIER2_TOKEN before starting xavier2}
      # Backend selector accepted by the Xavier2 launcher.
      XAVIER2_BACKEND: ${XAVIER2_BACKEND:-vec}
      # Explicit runtime backend override passed through to Xavier2.
      XAVIER2_MEMORY_BACKEND: ${XAVIER2_MEMORY_BACKEND:-vec}
      # Network binding and runtime paths.
      XAVIER2_HOST: 0.0.0.0
      XAVIER2_PORT: 8003
      XAVIER2_WORKSPACE_DIR: /data/workspaces
      XAVIER2_CODE_GRAPH_DB_PATH: /data/code_graph.db
      # Logging controls.
      RUST_LOG: ${RUST_LOG:-info}
      XAVIER2_LOG_LEVEL: ${XAVIER2_LOG_LEVEL:-info}
    volumes:
      - xavier2_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  xavier2_data:
    name: xavier2_data
