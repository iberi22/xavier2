# Xavier Change Control Policy
# Defines layer architecture, critical files, and validation rules for agent change control.

layers:
  - name: domain
    path: "src/domain/**"
    risk: high
    may_import: []

  - name: app
    path: "src/app/**"
    risk: medium
    may_import:
      - domain
      - ports

  - name: ports
    path: "src/ports/**"
    risk: high
    may_import:
      - domain

  - name: adapters
    path: "src/adapters/**"
    risk: medium
    may_import:
      - ports
      - app

  - name: memory
    path: "src/memory/**"
    risk: high
    may_import:
      - domain

  - name: coordination
    path: "src/coordination/**"
    risk: medium
    may_import:
      - domain
      - ports

critical_files:
  - "src/memory/qmd_memory.rs"
  - "src/memory/mod.rs"
  - "src/domain/memory/**"
  - "src/ports/inbound/memory_port.rs"
  - ".gitcore/ARCHITECTURE.md"
  - "src/settings.rs"
  - "src/main_http.rs"

rules:
  - id: domain_no_adapter_imports
    description: "Domain layer cannot import from adapters"
    severity: error

  - id: high_risk_requires_approval
    description: "High-risk files require human or architect-agent approval before modification"
    severity: block

  - id: port_contract_preservation
    description: "Port traits (src/ports/**) must preserve backward compatibility"
    severity: error

  - id: memory_schema_stability
    description: "Changes to memory schema (qmd_memory.rs, schema.rs) require ADR + migration plan"
    severity: block

  - id: no_refactor_without_tests
    description: "Refactors must include passing tests before merge"
    severity: warning
