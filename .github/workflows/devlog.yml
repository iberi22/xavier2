name: DevLog Generation and Deployment

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Xavier
        run: cargo build --release --bin xavier

      - name: Generate DevLog
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          XAVIER_TOKEN: ${{ secrets.XAVIER_TOKEN }}
          XAVIER_DEV_MODE: "true"
        run: |
          ./target/release/xavier devlog build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public/devlog/
          branch: gh-pages
