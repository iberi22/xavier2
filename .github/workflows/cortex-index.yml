name: Xavier Index

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/xavier-index.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build Xavier
        run: |
          docker build -t xavier:latest .

      - name: Start Xavier
        run: |
          docker run -d --rm \
            --name xavier-index \
            -e XAVIER_DEV_MODE=1 \
            -e XAVIER_HOST=0.0.0.0 \
            -e XAVIER_PORT=8003 \
            -e XAVIER_CODE_GRAPH_DB_PATH=/tmp/code_graph.db \
            -p 8003:8003 \
            -v ${{ github.workspace }}:/data/projects \
            xavier:latest

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8003/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs xavier-index
          exit 1

      - name: Generate Index
        run: |
          curl -fsS -X POST http://127.0.0.1:8003/code/scan \
            -H "Content-Type: application/json" \
            -d '{"path":"/data/projects"}'

      - name: Stop Xavier
        if: always()
        run: docker stop xavier-index || true

      - name: Commit Index
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "ci: Update Xavier index"
          file_pattern: ".xavier/index.json"
