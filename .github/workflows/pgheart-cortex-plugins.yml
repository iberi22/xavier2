name: Plugin Integration - Cortex & PgHeart

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      plugin:
        description: Plugin a ejecutar
        required: false
        default: all
        type: choice
        options:
          - all
          - cortex
          - pgheart
      direction:
        description: Direccion de sync
        required: false
        default: both
        type: choice
        options:
          - push
          - pull
          - both

env:
  XAVIER2_VERSION: 0.6.0-beta
  RUST_BACKTRACE: "1"

jobs:
  plugin-integration:
    name: "Plugin Sync"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Build plugin system
        run: cargo build --package xavier2 2>&1 | tail -20

      - name: Run plugin tests
        run: cargo test --lib -- plugins:: 2>&1 | tail -20

      - name: Sync to Cortex Enterprise
        if: inputs.plugin == 'cortex' || inputs.plugin == 'all' || github.event_name == 'schedule'
        env:
          CORTEX_ENTERPRISE_URL: ${{ secrets.CORTEX_ENTERPRISE_URL }}
          CORTEX_TOKEN: ${{ secrets.CORTEX_TOKEN }}
        run: |
          cargo run --package xavier2 --bin xavier2 -- plugin sync cortex ${{ inputs.direction || 'both' }} 2>&1

      - name: Sync to PgHeart
        if: inputs.plugin == 'pgheart' || inputs.plugin == 'all' || github.event_name == 'schedule'
        env:
          PGHEART_URL: ${{ secrets.PGHEART_URL }}
          PGHEART_TOKEN: ${{ secrets.PGHEART_TOKEN }}
          PGHEART_INSTANCE_ID: ${{ secrets.PGHEART_INSTANCE_ID }}
        run: |
          cargo run --package xavier2 --bin xavier2 -- plugin sync pgheart ${{ inputs.direction || 'both' }} 2>&1
