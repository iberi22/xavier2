name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.6.0-beta)'
        required: false
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Extract version ──
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

  # ── Test before release ──
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-targets --features ci-safe --exclude xavier-web

  # ── Build Windows ──
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [version, test]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build xavier (release)
        run: cargo build --release --bin xavier --features ci-safe
      - name: Package artifact
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $dest = "xavier-v$version-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $dest | Out-Null
          Copy-Item target/release/xavier.exe $dest/
          Copy-Item README.md $dest/
          Copy-Item LICENSE $dest/
          Compress-Archive -Path $dest -DestinationPath "$dest.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: xavier-windows
          path: xavier-v*.zip
          retention-days: 30

  # ── Build Linux (musl static) ──
  build-linux:
    name: Build (Linux musl)
    runs-on: ubuntu-latest
    needs: [version, test]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build xavier (release, musl)
        run: cargo build --release --bin xavier --features ci-safe --target x86_64-unknown-linux-musl
      - name: Package artifact
        run: |
          version="${{ needs.version.outputs.version }}"
          dest="xavier-v${version}-x86_64-unknown-linux-musl"
          mkdir -p "$dest"
          cp target/x86_64-unknown-linux-musl/release/xavier "$dest/"
          cp README.md LICENSE "$dest/"
          tar czf "${dest}.tar.gz" "$dest"
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: xavier-linux
          path: xavier-v*.tar.gz
          retention-days: 30

  # ── Create GitHub Release ──
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v6
        with:
          name: xavier-windows
      - name: Download Linux artifact
        uses: actions/download-artifact@v6
        with:
          name: xavier-linux
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.version.outputs.version }}"
          body: |
            ## Xavier v${{ needs.version.outputs.version }}

            ### Download
            - **Windows**: `xavier-v${{ needs.version.outputs.version }}-x86_64-pc-windows-msvc.zip`
            - **Linux (static)**: `xavier-v${{ needs.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz`

            ### Quick Install
            ```bash
            # Linux one-liner
            curl -fsSL https://github.com/iberi22/xavier/releases/download/v${{ needs.version.outputs.version }}/xavier-v${{ needs.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz | tar xz
            sudo mv xavier-v${{ needs.version.outputs.version }}-x86_64-unknown-linux-musl/xavier /usr/local/bin/
            ```
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'beta') || contains(needs.version.outputs.version, 'alpha') }}
          files: |
            xavier-v*.zip
            xavier-v*.tar.gz
