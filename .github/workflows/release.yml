name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.6.0-beta)'
        required: false
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Extract version ──
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

  # ── Test before release ──
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-targets --features ci-safe --exclude xavier-web

  # ── Build Windows (server + installer) ──
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [version, test]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Build main server (ci-safe, no GPU deps)
      - name: Build xavier server
        run: cargo build --release --bin xavier --features ci-safe

      # Build installer (cli-interactive TUI, no gllm to avoid GPU issues)
      - name: Build xavier-installer
        run: cargo build --release --bin xavier-installer --features cli-interactive --no-default-features

      - name: Package artifact
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $dest = "xavier-v$version-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $dest | Out-Null
          Copy-Item target/release/xavier.exe $dest/
          Copy-Item target/release/xavier-installer.exe $dest/
          Copy-Item install.ps1 $dest/
          Copy-Item README.md $dest/
          Copy-Item LICENSE $dest/
          Compress-Archive -Path $dest -DestinationPath "$dest.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: xavier-windows
          path: xavier-v*.zip
          retention-days: 30

  # ── Build Linux (musl static, server + installer) ──
  build-linux:
    name: Build (Linux musl)
    runs-on: ubuntu-latest
    needs: [version, test]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build main server (ci-safe) — use native glibc, sqlite-vec doesn't support musl
      - name: Build xavier server (linux)
        run: cargo build --release --bin xavier --features ci-safe

      # Build installer (cli-interactive TUI, no gllm)
      - name: Build xavier-installer (linux)
        run: cargo build --release --bin xavier-installer --features cli-interactive --no-default-features

      - name: Package artifact
        run: |
          version="${{ needs.version.outputs.version }}"
          dest="xavier-v${version}-x86_64-unknown-linux-gnu"
          mkdir -p "$dest"
          cp target/release/xavier "$dest/"
          cp target/release/xavier-installer "$dest/"
          cp install.sh "$dest/"
          cp README.md LICENSE "$dest/"
          chmod +x "$dest/xavier" "$dest/xavier-installer" "$dest/install.sh"
          tar czf "${dest}.tar.gz" "$dest"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: xavier-linux
          path: xavier-v*.tar.gz
          retention-days: 30

  # ── Create GitHub Release ──
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v6
        with:
          name: xavier-windows
      - name: Download Linux artifact
        uses: actions/download-artifact@v6
        with:
          name: xavier-linux
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.version.outputs.version }}"
          body: |
            ## Xavier2 v${{ needs.version.outputs.version }}

            Cognitive Memory Runtime for AI Agents — open source.

            ### 📦 Downloads

            | Platform | File |
            |----------|------|
            | **Windows** | `xavier-v${{ needs.version.outputs.version }}-x86_64-pc-windows-msvc.zip` |
            | **Linux (static)** | `xavier-v${{ needs.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz` |

            ### ⚡ One-liner Install

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/iberi22/xavier/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/iberi22/xavier/main/install.ps1 | iex
            ```

            ### 📋 What's Included

            - `xavier` — Memory server binary
            - `xavier-installer` — Interactive TUI setup wizard
            - `install.sh` / `install.ps1` — Platform install scripts
            - README + LICENSE

            ### 🚀 After Install

            ```bash
            xavier-installer     # Run setup wizard (interactive TUI)
            xavier serve         # Start the memory server
            xavier tui           # Launch the dashboard
            xavier save -k episodic "memory text"  # Save a memory
            ```

            ### 🔗 Links

            - [Documentation](https://github.com/iberi22/xavier)
            - [Issue Tracker](https://github.com/iberi22/xavier/issues)
            - [MIT License](https://github.com/iberi22/xavier/blob/main/LICENSE)
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'beta') || contains(needs.version.outputs.version, 'alpha') }}
          files: |
            xavier-v*.zip
            xavier-v*.tar.gz
