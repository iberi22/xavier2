name: CI + Push to Lab

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  LAB_REPO: southwest-ai-labs/xavier2
  GH_TOKEN_LAB: ${{ secrets.GH_TOKEN_LAB }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check (lint)
        run: cargo check --workspace --all-targets --features ci-safe --exclude xavier2-web

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features ci-safe --exclude xavier2-web -- -D warnings

      - name: Test
        run: cargo test --workspace --features ci-safe --exclude xavier2-web

      - name: Build
        run: cargo build --release --bin xavier2 --bin xavier2-tui

  push-to-lab:
    name: Push to Lab
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Push to Lab
        env:
          GH_TOKEN_LAB: ${{ secrets.GH_TOKEN_LAB }}
        run: |
          if [ -z "$GH_TOKEN_LAB" ]; then
            echo "GH_TOKEN_LAB not configured; skipping lab push."
            exit 0
          fi
          git remote add lab https://x-access-token:${GH_TOKEN_LAB}@github.com/${{ env.LAB_REPO }}.git
          git push lab main:main --force
